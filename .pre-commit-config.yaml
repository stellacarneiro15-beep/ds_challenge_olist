# Optional: requires the uv/pyproject.toml dev dependencies (ruff, mypy, nbqa).
# Install with: uv sync && uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        types_or: [python, jupyter]
        require_serial: true
        language: system
        entry: uv run ruff check --fix

      - id: mypy
        name: mypy
        types: [python]
        require_serial: true
        language: system
        entry: uv run mypy
        exclude: tests

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: requirements*.txt
      - id: trailing-whitespace
